version: '3.8'

services:
  gateway:
    image: nginx:alpine
    container_name: lucas-task-life-gateway
    ports:
      - "9999:9999"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./templates/index.html:/usr/share/nginx/html/index.html:ro
      - ./static:/usr/share/nginx/html/static:ro
    depends_on:
      - vault-service
      - calendar-service
      - gamification-service
    networks:
      - task-life-network

  vault-service:
    build:
      context: ./services/vault-service
      dockerfile: Dockerfile
    container_name: lucas-task-life-vault-service
    ports:
      - "9001:9001"
    volumes:
      - ${OBSIDIAN_VAULT_PATH}:/vault
    networks:
      - task-life-network

  calendar-service:
    build:
      context: ./services/calendar-service
      dockerfile: Dockerfile
    container_name: lucas-task-life-calendar-service
    ports:
      - "9002:9002"
    networks:
      - task-life-network

  gamification-service:
    build:
      context: ./services/gamification-service
      dockerfile: Dockerfile
    container_name: lucas-task-life-gamification-service
    ports:
      - "9003:9003"
    volumes:
      - ./config.json:/app/config.json
    networks:
      - task-life-network

networks:
  task-life-network:
    driver: bridge
