version: '3.8'

services:
  gateway:
    image: nginx:alpine
    container_name: lucas-task-life-gateway
    ports:
      - "9999:9999"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./templates/index.html:/usr/share/nginx/html/index.html:ro
      - ./static:/usr/share/nginx/html/static:ro
    depends_on:
      - vault-service
      - todo-service
    networks:
      - task-life-network

  vault-service:
    build:
      context: ./services/vault-service
      dockerfile: Dockerfile
    container_name: lucas-task-life-vault-service
    ports:
      - "9001:9001"
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - ${OBSIDIAN_VAULT_PATH}:/vault
    networks:
      - task-life-network

  telegram-bot:
    build:
      context: ./services/telegram-bot
      dockerfile: Dockerfile
    container_name: lucas-task-life-telegram-bot
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TODO_APP_URL=${TODO_APP_URL}
      - PYTHONUNBUFFERED=1
      - TZ=America/Sao_Paulo
    depends_on:
      - vault-service
      - todo-service
    networks:
      - task-life-network

  todo-service:
    build:
      context: ./services/todo-service
      dockerfile: Dockerfile
    container_name: lucas-task-life-todo-service
    ports:
      - "9005:9005"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=lucas_todo
      - POSTGRES_USER=lucas_user
      - POSTGRES_PASSWORD=lucas_password
      - TZ=America/Sao_Paulo
    depends_on:
      - postgres
    networks:
      - task-life-network

  finance-service:
    build:
      context: ./services/finance-service
      dockerfile: Dockerfile
    container_name: lucas-task-life-finance-service
    ports:
      - "9006:9006"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=lucas_todo
      - POSTGRES_USER=lucas_user
      - POSTGRES_PASSWORD=lucas_password
      - TZ=America/Sao_Paulo
    depends_on:
      - postgres
    networks:
      - task-life-network

  postgres:
    image: postgres:16-alpine
    container_name: lucas-task-life-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=lucas_todo
      - POSTGRES_USER=lucas_user
      - POSTGRES_PASSWORD=lucas_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - task-life-network

networks:
  task-life-network:
    driver: bridge

volumes:
  postgres_data:


