events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Backend upstream blocks
    upstream vault_service {
        server vault-service:9001;
    }

    upstream calendar_service {
        server calendar-service:9002;
    }

    upstream gamification_service {
        server gamification-service:9003;
    }

    server {
        listen 9999;
        server_name localhost;

        # Serve SPA frontend static files
        location / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        location /static/ {
            root /usr/share/nginx/html;
            autoindex off;
        }

        # Route Vault Service APIs
        location ~ ^/api/(habits|quests|projects|study-plan|manifesto) {
            proxy_pass http://vault_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route Quest Toggle specifically to Vault Service
        location /api/quests/toggle {
            proxy_pass http://vault_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route Calendar Service API
        location /api/calendar {
            proxy_pass http://calendar_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route Gamification Service APIs
        location ~ ^/api/(status|stats|financial|settings) {
            proxy_pass http://gamification_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
