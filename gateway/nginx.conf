events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Backend upstream blocks
    upstream vault_service {
        server vault-service:9001;
    }

    upstream todo_service {
        server todo-service:9005;
    }

    server {
        listen 9999;
        server_name localhost;

        # Serve Todo List as the main root page
        location / {
            proxy_pass http://todo_service/todo;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /static/ {
            root /usr/share/nginx/html;
            autoindex off;
        }

        # Route Vault Service APIs (projects, study-plan, etc.)
        location ~ ^/api/(habits|quests|projects|study-plan|manifesto) {
            proxy_pass http://vault_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route Quest Toggle specifically to Vault Service
        location /api/quests/toggle {
            proxy_pass http://vault_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route to Todo Service Web Page
        location = /todo {
            proxy_pass http://todo_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route to Todo Service APIs
        location /api/todo {
            proxy_pass http://todo_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
